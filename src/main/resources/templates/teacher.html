<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - BOUDOUR Hanine</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container flex justify-between align-center">
            <div class="navbar-brand" style="display: flex; align-items: center; gap: 0.75rem;">
                <div style="width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;">
                    <img src="https://ik.imagekit.io/vnn357ctl/Univ-Logo.png" alt="Logo"
                        style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <div style="font-size: 1.25rem; font-weight: 700;">BOUDOUR Hanine</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 500;">Teacher Portal
                    </div>
                </div>
            </div>
            <div id="userInfo"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Welcome Card -->
        <div class="card">
            <h2>👋 Welcome, Teacher!</h2>
            <p>Manage marks for your assigned module and view your students.</p>
        </div>

        <!-- Module Info Card -->
        <div class="card" id="moduleCard">
            <div class="card-header">
                <h3 class="card-title">📚 My Module</h3>
            </div>
            <div id="moduleInfo"></div>
        </div>

        <!-- Tabs -->
        <div class="card">
            <div style="border-bottom: 2px solid var(--border-color); margin-bottom: 1.5rem;">
                <div style="display: flex; gap: 1rem;">
                    <button class="tab-btn active" onclick="switchTab('students', event)">My Students</button>
                    <button class="tab-btn" onclick="switchTab('marks', event)">Marks Management</button>
                    <button class="tab-btn" onclick="switchTab('reports', event)">Mark Reports</button>
                </div>
            </div>

            <!-- Students Tab -->
            <div id="studentsTab" class="tab-content active">
                <div class="card-header">
                    <h3 class="card-title">Students in My Module</h3>
                </div>
                <div id="studentsTable"></div>
            </div>

            <!-- Marks Tab -->
            <div id="marksTab" class="tab-content hidden">
                <div class="card-header">
                    <h3 class="card-title">Manage Marks</h3>
                    <button class="btn btn-primary" onclick="showAddMarkModal()">+ Add Mark</button>
                </div>
                <div id="marksTable"></div>
            </div>

            <!-- Reports Tab -->
            <div id="reportsTab" class="tab-content hidden">
                <div class="card-header">
                    <h3 class="card-title">🚩 Mark Change Reports</h3>
                </div>
                <div id="reportsTable"></div>
            </div>
        </div>
    </div>

    <!-- Add Mark Modal -->
    <div id="addMarkModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Mark</h3>
                <button onclick="hideAddMarkModal()"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <form id="addMarkForm">
                <div class="form-group">
                    <label class="form-label">Student</label>
                    <select id="markStudentId" class="form-control" required>
                        <option value="">Select Student</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Score (0-20)</label>
                    <input type="number" id="markScore" class="form-control" min="0" max="20" step="0.25" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Comments (Optional)</label>
                    <textarea id="markComments" class="form-control" rows="3"></textarea>
                </div>
                <div class="flex gap-md justify-end">
                    <button type="button" class="btn btn-outline" onclick="hideAddMarkModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Mark</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Mark Modal -->
    <div id="editMarkModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Mark</h3>
                <button onclick="hideEditMarkModal()"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <form id="editMarkForm">
                <input type="hidden" id="editMarkId">
                <div class="form-group">
                    <label class="form-label">Student</label>
                    <input type="text" id="editStudentName" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Score (0-20)</label>
                    <input type="number" id="editMarkScore" class="form-control" min="0" max="20" step="0.25" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Comments (Optional)</label>
                    <textarea id="editMarkComments" class="form-control" rows="3"></textarea>
                </div>
        </div>
        </form>
    </div>
    </div>

    <!-- Handle Report Modal -->
    <div id="handleReportModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Handle Mark Report</h3>
                <button onclick="hideHandleReportModal()"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <form id="handleReportForm">
                <input type="hidden" id="reportId">
                <div class="form-group">
                    <label class="form-label">Student</label>
                    <input type="text" id="reportStudentName" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Module</label>
                    <input type="text" id="reportModuleName" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Current Score</label>
                    <input type="text" id="reportCurrentScore" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Student's Reason</label>
                    <div id="reportReasonText" class="alert alert-info" style="white-space: pre-wrap;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Comment</label>
                    <textarea id="reportTeacherComment" class="form-control" rows="3"
                        placeholder="Explain your decision..."></textarea>
                </div>
                <div class="flex gap-md justify-end"
                    style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-outline" onclick="hideHandleReportModal()"
                        style="min-width: 100px;">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="updateReportStatus('REFUSED')"
                        style="min-width: 100px;">Refuse</button>
                    <button type="button" class="btn btn-success" onclick="updateReportStatus('ACCEPTED')"
                        style="min-width: 120px; font-weight: 700; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);">Accept</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--teacher-color);
            border-bottom-color: var(--teacher-color);
        }

        .tab-content {
            display: block;
        }

        .tab-content.hidden {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal:not(.hidden) {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .module-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .module-detail {
            padding: 1rem;
            background: var(--bg-color);
            border-radius: var(--radius-md);
        }

        .module-detail strong {
            display: block;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .module-detail span {
            font-size: 1.125rem;
            color: var(--text-primary);
            font-weight: 600;
        }
    </style>

    <script src="/js/api.js"></script>
    <script>
        let allStudents = [];
        let currentMarks = [];
        let currentReports = [];

        // Load initial data
        document.addEventListener('DOMContentLoaded', function () {
            displayUserInfo();
            loadModule();
            loadMarks();
            loadReports();
        });

        // Switch tabs
        function switchTab(tab, event) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tab + 'Tab').classList.remove('hidden');

            if (tab === 'students') loadStudents();
            else if (tab === 'marks') loadMarks();
            else if (tab === 'reports') loadReports();

            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        // Load module info
        async function loadModule() {
            showLoading('moduleInfo');
            try {
                currentModule = await API.get('/api/teacher/module');

                if (currentModule.message) {
                    document.getElementById('moduleInfo').innerHTML = `
                        <div class="alert alert-info">${currentModule.message}</div>
                    `;
                    return;
                }

                const html = `
                    <div class="module-info">
                        <div class="module-detail">
                            <strong>Module Name</strong>
                            <span>${currentModule.name}</span>
                        </div>
                        <div class="module-detail">
                            <strong>Code</strong>
                            <span>${currentModule.code}</span>
                        </div>
                        <div class="module-detail">
                            <strong>Description</strong>
                            <span>${currentModule.description || 'N/A'}</span>
                        </div>
                    </div>
                `;

                document.getElementById('moduleInfo').innerHTML = html;
            } catch (error) {
                showError('Failed to load module information: ' + error.message, 'moduleInfo');
            }
        }

        // Load students
        async function loadStudents() {
            showLoading('studentsTable');
            try {
                const students = await API.get('/api/teacher/students');
                allStudents = students;

                if (students.length === 0) {
                    document.getElementById('studentsTable').innerHTML = `
                        <div class="alert alert-info">No students enrolled in your module yet.</div>
                    `;
                    return;
                }

                let html = '<div class="table-container"><table><thead><tr>';
                html += '<th>ID</th><th>Full Name</th><th>Username</th><th>Email</th><th>Enrollment Date</th>';
                html += '</tr></thead><tbody>';

                students.forEach(student => {
                    html += `<tr>
                        <td>${student.id}</td>
                        <td><strong>${student.fullName}</strong></td>
                        <td>${student.user ? student.user.username : 'N/A'}</td>
                        <td>${student.user ? student.user.email : 'N/A'}</td>
                        <td>${formatDate(student.enrollmentDate)}</td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                document.getElementById('studentsTable').innerHTML = html;
            } catch (error) {
                showError('Failed to load students: ' + error.message, 'studentsTable');
            }
        }

        // Load marks
        async function loadMarks() {
            showLoading('marksTable');
            try {
                const marks = await API.get('/api/teacher/marks');
                currentMarks = marks;

                if (marks.length === 0) {
                    document.getElementById('marksTable').innerHTML = `
                        <div class="alert alert-info">No marks recorded yet. Click "Add Mark" to get started.</div>
                    `;
                    return;
                }

                let html = '<div class="table-container"><table><thead><tr>';
                html += '<th>Student</th><th>Score</th><th>Date</th><th>Comments</th><th>Actions</th>';
                html += '</tr></thead><tbody>';

                marks.forEach((mark, index) => {
                    html += `<tr>
                        <td><strong>${mark.student.fullName}</strong></td>
                        <td>${formatScore(mark.score)}</td>
                        <td>${formatDate(mark.markDate)}</td>
                        <td>${mark.comments || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline" onclick="editMarkByIndex(${index})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteMark(${mark.id})">Delete</button>
                        </td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                document.getElementById('marksTable').innerHTML = html;
            } catch (error) {
                showError('Failed to load marks: ' + error.message, 'marksTable');
            }
        }

        // Show add mark modal
        async function showAddMarkModal() {
            // Load all students first
            try {
                const students = await API.get('/api/teacher/students');
                const select = document.getElementById('markStudentId');
                select.innerHTML = '<option value="">Select Student</option>';

                students.forEach(student => {
                    select.innerHTML += `<option value="${student.id}">${student.fullName}</option>`;
                });

                document.getElementById('addMarkModal').classList.remove('hidden');
            } catch (error) {
                showError('Failed to load students: ' + error.message);
            }
        }

        // Hide add mark modal
        function hideAddMarkModal() {
            document.getElementById('addMarkModal').classList.add('hidden');
            document.getElementById('addMarkForm').reset();
        }

        // Add mark form submission
        document.getElementById('addMarkForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const markData = {
                studentId: parseInt(document.getElementById('markStudentId').value),
                score: parseFloat(document.getElementById('markScore').value),
                comments: document.getElementById('markComments').value
            };

            try {
                await API.post('/api/teacher/marks', markData);
                showSuccess('Mark added successfully!');
                hideAddMarkModal();
                loadMarks();
            } catch (error) {
                console.error('[ERROR] Failed to add mark:', error);
                showError('Failed to add mark: ' + error.message);
            }
        });

        // Edit mark by index
        function editMarkByIndex(index) {
            const mark = currentMarks[index];
            if (mark) {
                editMark(mark);
            }
        }

        // Edit mark
        function editMark(mark) {
            document.getElementById('editMarkId').value = mark.id;
            document.getElementById('editStudentName').value = mark.student.fullName;
            document.getElementById('editMarkScore').value = mark.score;
            document.getElementById('editMarkComments').value = mark.comments || '';
            document.getElementById('editMarkModal').classList.remove('hidden');
        }

        // Hide edit mark modal
        function hideEditMarkModal() {
            document.getElementById('editMarkModal').classList.add('hidden');
            document.getElementById('editMarkForm').reset();
        }

        // Edit mark form submission
        document.getElementById('editMarkForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const markId = document.getElementById('editMarkId').value;
            const markData = {
                score: parseFloat(document.getElementById('editMarkScore').value),
                comments: document.getElementById('editMarkComments').value
            };

            try {
                await API.put(`/api/teacher/marks/${markId}`, markData);
                showSuccess('Mark updated successfully!');
                hideEditMarkModal();
                loadMarks();
            } catch (error) {
                console.error('[ERROR] Failed to update mark:', error);
                showError('Failed to update mark: ' + error.message);
            }
        });

        // Delete mark
        async function deleteMark(markId) {
            if (!confirm('Are you sure you want to delete this mark?')) return;

            try {
                await API.delete(`/api/teacher/marks/${markId}`);
                showSuccess('Mark deleted successfully');
                loadMarks();
            } catch (error) {
                showError('Failed to delete mark: ' + error.message);
            }
        }

        // Load reports
        async function loadReports() {
            showLoading('reportsTable');
            try {
                const reports = await API.get('/api/teacher/reports');
                currentReports = reports;

                if (reports.length === 0) {
                    document.getElementById('reportsTable').innerHTML = `
                        <div class="alert alert-info">No reports found for your marks.</div>
                    `;
                    return;
                }

                let html = '<div class="table-container"><table><thead><tr>';
                html += '<th>Student</th><th>Module</th><th>Score</th><th>Reason</th><th>Status</th><th>Date</th><th>Action</th>';
                html += '</tr></thead><tbody>';

                reports.forEach((report, index) => {
                    const statusClass = report.status.toLowerCase();
                    const isWaiting = report.status === 'WAITING';

                    html += `<tr>
                        <td><strong>${report.mark.student.fullName}</strong></td>
                        <td>${report.mark.module.name}</td>
                        <td>${formatScore(report.mark.score)}</td>
                        <td><small title="${report.reason}">${report.reason.substring(0, 50)}${report.reason.length > 50 ? '...' : ''}</small></td>
                        <td><span class="badge badge-${statusClass}">${report.status}</span></td>
                        <td>${new Date(report.reportDate).toLocaleDateString()}</td>
                        <td>
                            ${isWaiting ?
                            `<button class="btn btn-sm btn-primary" onclick="showHandleReportModalByIndex(${index})">Review</button>` :
                            '<span class="text-secondary">-</span>'}
                        </td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                document.getElementById('reportsTable').innerHTML = html;
            } catch (error) {
                showError('Failed to load reports', 'reportsTable');
            }
        }

        // Handle Report Modals by index
        function showHandleReportModalByIndex(index) {
            const report = currentReports[index];
            if (report) {
                showHandleReportModal(report);
            }
        }

        // Handle Report Modals
        function showHandleReportModal(report) {
            document.getElementById('reportId').value = report.id;
            document.getElementById('reportStudentName').value = report.mark.student.fullName;
            document.getElementById('reportModuleName').value = report.mark.module.name;
            document.getElementById('reportCurrentScore').value = report.mark.score;
            document.getElementById('reportReasonText').textContent = report.reason;
            document.getElementById('reportTeacherComment').value = '';
            document.getElementById('handleReportModal').classList.remove('hidden');
        }

        function hideHandleReportModal() {
            document.getElementById('handleReportModal').classList.add('hidden');
        }

        async function updateReportStatus(status) {
            const id = document.getElementById('reportId').value;
            const comment = document.getElementById('reportTeacherComment').value;

            try {
                await API.put(`/api/teacher/reports/${id}`, {
                    status: status,
                    teacherComment: comment
                });
                showSuccess(`Report ${status.toLowerCase()} successfully`);
                hideHandleReportModal();
                loadReports();
            } catch (error) {
                showError('Failed to update report: ' + error.message);
            }
        }
    </script>
</body>

</html>
