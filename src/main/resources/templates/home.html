<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Student Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <h1>Student Management Portal</h1>

        <div th:if="${username}" class="welcome">
            <p>Hello, <strong th:text="${username}">User</strong>!</p>
        </div>

        <div class="links">
            <!-- If not logged in, show login button -->
            <div th:if="${username == null}">
                <a href="/login" class="btn-primary">Login</a>
            </div>

            <!-- If logged in as regular user (NOT admin) -->
            <div th:if="${username != null and isAdmin == false}">
                <a href="/user" class="btn-primary">User Dashboard</a>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-danger">Logout</button>
                </form>
            </div>

            <!-- If logged in as admin -->
            <div th:if="${username != null and isAdmin == true}">
                <a href="/user" class="btn-primary">User Dashboard</a>
                <a href="/admin" class="btn-secondary">Admin Dashboard</a>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-danger">Logout</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
